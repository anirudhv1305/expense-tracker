services:
  - type: web
    name: expense-tracker
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile

    envVars:
      - key: DATABASE_URL
        sync: false

      - key: DATABASE_USERNAME
        sync: false

      - key: DATABASE_PASSWORD
        sync: false

      - key: JWT_SECRET
        sync: false

      - key: JWT_EXPIRATION_MINUTES
        value: "43200"

      - key: CORS_ALLOWED_ORIGINS
        value: "*"
